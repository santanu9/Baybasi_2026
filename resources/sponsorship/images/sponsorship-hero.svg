<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD9C2"/>
      <stop offset="40%" stop-color="#FFE4D6"/>
      <stop offset="100%" stop-color="#FFF7ED"/>
    </linearGradient>
    <radialGradient id="sglow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="ribbonfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <linearGradient id="barTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="sfadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF7ED" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFF7ED" stop-opacity="0.88"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="800" fill="url(#sbg)"/>
  <rect width="1920" height="800" fill="url(#sglow)"/>

  <!-- LEFT: vibrant growth bar chart with arrow -->
  <g transform="translate(120, 220)">
    <rect x="0"   y="180" width="60" height="120" rx="8" fill="#7F1D1D"/>
    <rect x="80"  y="140" width="60" height="160" rx="8" fill="#B91C1C"/>
    <rect x="160" y="80"  width="60" height="220" rx="8" fill="#EF4444"/>
    <rect x="240" y="20"  width="60" height="280" rx="8" fill="url(#barTop)"/>
    <!-- highlights on bar tops -->
    <circle cx="30"  cy="180" r="12" fill="#FBBF24" stroke="#7F1D1D" stroke-width="2"/>
    <circle cx="110" cy="140" r="12" fill="#FBBF24" stroke="#7F1D1D" stroke-width="2"/>
    <circle cx="190" cy="80"  r="12" fill="#FBBF24" stroke="#7F1D1D" stroke-width="2"/>
    <circle cx="270" cy="20"  r="14" fill="#FFF7ED" stroke="#7F1D1D" stroke-width="3"/>
    <!-- rising arrow -->
    <path d="M -10 290 L 320 -20" stroke="#7F1D1D" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="0"/>
    <path d="M 280 -32 L 326 -16 L 314 36" stroke="#7F1D1D" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- CENTER: bold handshake -->
  <g transform="translate(810, 170)">
    <!-- Soft glow -->
    <ellipse cx="180" cy="100" rx="220" ry="80" fill="#F59E0B" opacity="0.20"/>
    <!-- left arm cuff -->
    <rect x="-30" y="50" width="130" height="60" rx="8" fill="#7F1D1D"/>
    <rect x="-30" y="48" width="130" height="12" rx="4" fill="#F59E0B"/>
    <!-- left hand -->
    <path d="M100 64 C 110 52, 132 52, 144 64 L 176 80 C 188 88, 192 100, 184 110 L 164 122 C 156 128, 142 128, 132 122 L 100 106 Z" fill="#B91C1C"/>
    <!-- right arm cuff -->
    <rect x="270" y="50" width="130" height="60" rx="8" fill="#B91C1C"/>
    <rect x="270" y="48" width="130" height="12" rx="4" fill="#F59E0B"/>
    <!-- right hand -->
    <path d="M270 64 C 260 52, 238 52, 226 64 L 194 80 C 182 88, 178 100, 186 110 L 206 122 C 214 128, 228 128, 238 122 L 270 106 Z" fill="#7F1D1D"/>
    <!-- clasped fingers in middle -->
    <ellipse cx="185" cy="92" rx="42" ry="26" fill="#7F1D1D"/>
    <line x1="156" y1="84" x2="214" y2="84" stroke="#FFF7ED" stroke-width="3.5"/>
    <line x1="156" y1="98" x2="214" y2="98" stroke="#FFF7ED" stroke-width="3.5"/>
    <line x1="156" y1="92" x2="214" y2="92" stroke="#FFF7ED" stroke-width="3.5"/>
  </g>

  <!-- RIGHT: vibrant trophy badge -->
  <g transform="translate(1430, 100)">
    <!-- ribbons -->
    <path d="M 80 240 L 130 250 L 150 320 L 100 310 Z" fill="url(#ribbonfill)"/>
    <path d="M 240 240 L 190 250 L 170 320 L 220 310 Z" fill="url(#ribbonfill)"/>
    <!-- glow -->
    <circle cx="160" cy="160" r="140" fill="#F59E0B" opacity="0.30"/>
    <circle cx="160" cy="160" r="118" fill="url(#goldfill)"/>
    <circle cx="160" cy="160" r="106" fill="none" stroke="#7F1D1D" stroke-width="5"/>
    <circle cx="160" cy="160" r="92" fill="none" stroke="#FFF7ED" stroke-width="2"/>
    <!-- star -->
    <path d="M160 78 L 176 122 L 222 122 L 186 150 L 200 192 L 160 164 L 120 192 L 134 150 L 98 122 L 144 122 Z" fill="#7F1D1D"/>
    <path d="M160 78 L 176 122 L 222 122 L 186 150 L 200 192 L 160 164 Z" fill="#B91C1C"/>
  </g>

  <!-- Connecting dots between elements -->
  <g opacity="0.50">
    <line x1="480" y1="320" x2="800" y2="240" stroke="#7F1D1D" stroke-width="2.5" stroke-dasharray="6 8"/>
    <line x1="1230" y1="240" x2="1430" y2="220" stroke="#7F1D1D" stroke-width="2.5" stroke-dasharray="6 8"/>
  </g>

  <!-- Decorative wave band -->
  <g opacity="0.62" transform="translate(-50, 580)">
    <path d="M0 200 Q 300 100, 600 200 T 1200 200 T 1800 200 T 2050 200 L 2050 260 L 0 260 Z" fill="#F59E0B"/>
  </g>
  <g opacity="0.75" transform="translate(0, 620)">
    <path d="M0 200 Q 280 130, 560 200 T 1120 200 T 1680 200 T 1920 200 L 1920 230 L 0 230 Z" fill="#B91C1C"/>
  </g>

  <!-- CREAM FADE at bottom for text legibility -->
  <rect x="0" y="350" width="1920" height="450" fill="url(#sfadeBottom)"/>
</svg>
