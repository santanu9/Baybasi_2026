            h("div", { className: "flex-1 h-px", style: { background: 'linear-gradient(90deg, rgba(127,29,29,0.25), transparent)' } })
          ),
          h("div", { className: "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3" },
            g.items.slice().sort(byOrder).map((it, i) => h("div", {
              key: i,

              style: { background: warmPillBg, boxShadow: warmInset + ', 0 12px 30px rgba(127,29,29,0.09)' }
            },
              h("span", { className: "text-[#111827] text-base font-body font-semibold" }, ...renderProduct(it.product)),
              h("span", { className: "text-[#7F1D1D] font-heading text-lg whitespace-nowrap font-bold" }, it.price)
            ))
          )
        ))
      ),

      h(motion.div, _extends({
        className: "rounded-[1.5rem] border border-[#7F1D1D]/15 p-8 shadow-[0_24px_58px_rgba(127,29,29,0.12)]",
        style: { background: warmCardBg, boxShadow: warmInset + ', 0 24px 58px rgba(127,29,29,0.12)' }
      }, sa(0.3)),
        h("h3", { className: "font-heading text-[#111827] text-3xl mb-2 font-bold text-center lg:text-left" }, "Annual Magazine — Autumn Festival"),
        h("p", { className: "text-[#4B5563] text-base font-body font-medium mb-6 text-center lg:text-left" }, "Pricing per placement."),
        h("div", { className: "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3 justify-items-center" },
          magazine.map(m => h("div", {
            key: m.name,
            className: "w-full max-w-[16rem] rounded-2xl border border-[#7F1D1D]/12 p-4 flex flex-col items-center text-center",
            style: { background: warmPillBg, boxShadow: warmInset }
          },
            h("div", { className: "w-full text-center font-heading text-[#111827] text-base mb-1 font-bold" }, m.name),
            h("div", { className: "w-full text-center font-heading text-[#7F1D1D] text-xl font-bold" }, m.price)
          ))
        )
      ),

      h(motion.div, _extends({ className: "mt-14 flex items-center justify-center" }, sa(0.4)),
        h("button", {
          type: "button",
          disabled: true,
          className: "inline-flex items-center gap-2 bg-[#7F1D1D]/85 cursor-not-allowed rounded-full px-7 py-3 text-base font-semibold text-white shadow-[0_12px_28px_rgba(127,29,29,0.18)]"
        }, "Coming Soon")
      )
    )
  );
}
