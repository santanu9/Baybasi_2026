<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – Baybasi Content Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: {
        sans: ['Aptos', 'Calibri', 'Trebuchet MS', 'Arial', 'sans-serif'],
      }}}
    }
  </script>
  <script src="js/content.js"></script>
  <style>
    body { font-family: Aptos, Calibri, 'Trebuchet MS', Arial, sans-serif; }
    .drop-zone { border: 2px dashed #E5E7EB; transition: border-color 0.2s, background 0.2s; }
    .drop-zone.drag-over { border-color: #B91C1C; background: rgba(185,28,28,0.04); }
    .thumb { width: 120px; height: 64px; object-fit: contain; border-radius: 0.5rem; background: #F9F9F9; border: 1px solid #E5E7EB; }
    .tab-btn { padding: 0.5rem 1.25rem; border-radius: 9999px; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .tab-btn.active { background: #B91C1C; color: #fff; }
    .tab-btn:not(.active) { background: rgba(31,41,55,0.06); color: #6B7280; }
    .card { background: #fff; border: 1px solid #E5E7EB; border-radius: 1rem; padding: 1.25rem; }
    .badge { font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 9999px; }
  </style>
</head>
<body class="bg-[#FFF7ED] min-h-screen">

<!-- ── Login Screen ─────────────────────────────────────────────────── -->
<div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-sm">
    <div class="flex items-center gap-3 mb-8">
      <img src="images/common/baybasi-logo.png" alt="Baybasi" style="height:48px;width:48px;object-fit:contain"/>
      <div>
        <div class="font-bold text-xl text-[#B91C1C]">Baybasi</div>
        <div class="text-xs text-[#6B7280]">Content Manager</div>
      </div>
    </div>
    <p class="text-sm text-[#6B7280] mb-6">Enter your admin password to continue.</p>
    <div class="flex flex-col gap-3">
      <input id="pw-input" type="password" placeholder="Password"
        class="border border-[#E5E7EB] rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#B91C1C]/30"/>
      <div id="pw-error" class="text-red-600 text-xs hidden">Incorrect password. Please try again.</div>
      <button onclick="tryLogin()"
        class="bg-[#B91C1C] text-white rounded-full py-3 text-sm font-semibold hover:bg-[#991515] transition-colors">
        Sign In
      </button>
    </div>
  </div>
</div>

<!-- ── Admin App ─────────────────────────────────────────────────────── -->
<div id="admin-app" class="hidden">

  <!-- Header -->
  <header class="bg-white border-b border-[#E5E7EB] sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="images/common/baybasi-logo.png" alt="Baybasi" style="height:40px;width:40px;object-fit:contain"/>
        <div>
          <span class="font-bold text-[#B91C1C]">Baybasi</span>
          <span class="text-[#6B7280] text-sm ml-2">Content Manager</span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <a href="index.html" target="_blank"
          class="text-sm text-[#6B7280] hover:text-[#1F2937] transition-colors">View Site ↗</a>
        <button onclick="doLogout()"
          class="text-sm bg-[#F3F4F6] text-[#6B7280] rounded-full px-4 py-1.5 hover:bg-[#E5E7EB] transition-colors">
          Sign Out
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">

    <!-- Summary bar -->
    <div class="mb-8 flex flex-wrap items-center gap-4">
      <div>
        <h1 class="text-2xl font-bold text-[#1F2937]">Image Manager</h1>
        <p class="text-sm text-[#6B7280] mt-0.5">Upload images per section. Changes reflect instantly in the same browser.</p>
      </div>
      <div class="ml-auto flex gap-2">
        <button onclick="handleExport()"
          class="text-xs border border-[#E5E7EB] rounded-full px-4 py-2 text-[#6B7280] hover:bg-[#F9F9F9] transition-colors">
          Export Backup
        </button>
        <label class="text-xs border border-[#E5E7EB] rounded-full px-4 py-2 text-[#6B7280] hover:bg-[#F9F9F9] transition-colors cursor-pointer">
          Import Backup
          <input type="file" accept=".json" class="hidden" onchange="handleImport(this)"/>
        </label>
        <button onclick="confirmResetAll()"
          class="text-xs border border-red-200 rounded-full px-4 py-2 text-red-500 hover:bg-red-50 transition-colors">
          Reset All
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div id="tabs" class="flex flex-wrap gap-2 mb-8"></div>

    <!-- Panels -->
    <div id="panels"></div>

  </main>
</div>

<script>
// ── Auth ─────────────────────────────────────────────────────────────────────
var ADMIN_PW = 'baybasi2026';  // Change this to your desired password

function tryLogin() {
  var pw = document.getElementById('pw-input').value;
  var err = document.getElementById('pw-error');
  if (pw === ADMIN_PW) {
    sessionStorage.setItem('baybasi_admin', '1');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-app').classList.remove('hidden');
    initApp();
  } else {
    err.classList.remove('hidden');
    document.getElementById('pw-input').value = '';
  }
}

document.getElementById('pw-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') tryLogin();
});

function doLogout() {
  sessionStorage.removeItem('baybasi_admin');
  location.reload();
}

// Auto-login if session still valid
if (sessionStorage.getItem('baybasi_admin') === '1') {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-app').classList.remove('hidden');
}

// ── Content schema ────────────────────────────────────────────────────────────
var SECTIONS = [
  {
    id: 'common',
    label: 'Common',
    items: [
      { key: 'logo', label: 'Site Logo', default: 'images/common/baybasi-logo.png', hint: 'Appears in navbar and footer across all pages.' },
    ],
  },
  {
    id: 'home',
    label: 'Home',
    items: [
      { key: 'home_hero_bg',   label: 'Hero Background',     default: 'images/home/hero-bg.jpg',   hint: 'Full-screen hero image on the home page.' },
      { key: 'home_about_1',  label: 'About Panel 1',       default: 'images/home/about-1.jpg',   hint: 'First About panel image.' },
      { key: 'home_about_2',  label: 'About Panel 2',       default: 'images/home/about-2.jpg',   hint: 'Second About panel image.' },
      { key: 'home_about_3',  label: 'About Panel 3',       default: 'images/home/about-3.jpg',   hint: 'Third About panel image.' },
      { key: 'home_about_4',  label: 'About Panel 4',       default: 'images/home/about-4.jpg',   hint: 'Fourth About panel image.' },
    ],
  },
  {
    id: 'about',
    label: 'About Us',
    items: [
      { key: 'about_hero',     label: 'Hero Image',          default: 'images/about/hero.jpg',     hint: 'About page hero section background.' },
      { key: 'about_team_1',   label: 'Team Photo 1',        default: 'images/about/team-1.jpg',   hint: 'Leadership / team photo 1.' },
      { key: 'about_team_2',   label: 'Team Photo 2',        default: 'images/about/team-2.jpg',   hint: 'Leadership / team photo 2.' },
    ],
  },
  {
    id: 'impacts',
    label: 'Impacts',
    items: [
      { key: 'impacts_hero',   label: 'Hero Image',          default: 'images/impacts/hero.jpg',   hint: 'Impacts page hero section background.' },
      { key: 'impacts_photo1', label: 'Impact Photo 1',      default: 'images/impacts/photo1.jpg', hint: 'Shown next to first testimony.' },
      { key: 'impacts_photo2', label: 'Impact Photo 2',      default: 'images/impacts/photo2.jpg', hint: 'Shown next to second testimony.' },
      { key: 'impacts_photo3', label: 'Impact Photo 3',      default: 'images/impacts/photo3.jpg', hint: 'Shown next to third testimony.' },
    ],
  },
  {
    id: 'events',
    label: 'Events',
    items: [
      { key: 'event_spring_fest', label: 'Spring Fest',      default: 'images/events/spring-fest/cover.jpg',  hint: 'Cover photo for Spring Fest.' },
      { key: 'event_holi',        label: 'Holi',             default: 'images/events/holi/cover.jpg',         hint: 'Cover photo for Holi event.' },
      { key: 'event_boishakhi',   label: 'Boishakhi Mela',   default: 'images/events/boishakhi/cover.jpg',    hint: 'Cover photo for Boishakhi Mela.' },
      { key: 'event_autumn_fest', label: 'Autumn Fest',      default: 'images/events/autumn-fest/cover.jpg',  hint: 'Cover photo for Autumn Fest.' },
      { key: 'event_diwali',      label: 'Diwali Night',     default: 'images/events/diwali/cover.jpg',       hint: 'Cover photo for Diwali Night.' },
      { key: 'event_picnic',      label: 'Annual Picnic',    default: 'images/events/picnic/cover.jpg',       hint: 'Cover photo for Annual Picnic.' },
    ],
  },
  {
    id: 'sponsors',
    label: 'Sponsors',
    items: [
      { key: 'sp_indian_grocery',  label: 'India Grocery & Spice',    default: 'images/sponsors/indian_grocery_image001.png',                         hint: 'Platinum sponsor logo.' },
      { key: 'sp_future_right',    label: 'Future Right',             default: 'images/sponsors/future_right_v2-768x644.png',                         hint: 'Platinum sponsor logo.' },
      { key: 'sp_zaman',           label: 'Zaman / Cal Coast',        default: 'images/sponsors/zaman-1024x571.jpeg',                                  hint: 'Gold sponsor logo.' },
      { key: 'sp_ask_for_cure',    label: 'Ask For Cure',             default: 'images/sponsors/I-693_New-1024x683.jpeg',                              hint: 'Gold sponsor logo.' },
      { key: 'sp_ravi',            label: 'Ravi Jagtiani',            default: 'images/sponsors/ravi_jagtiani_new-1024x512.jpg',                       hint: 'Silver sponsor logo.' },
      { key: 'sp_ramez',           label: 'Ramez Tabri Real Estate',  default: 'images/sponsors/ramez_tabri_updated.jpg',                              hint: 'Silver sponsor logo.' },
      { key: 'sp_first_bank',      label: 'First Bank',               default: 'images/sponsors/first_bank.png',                                       hint: 'Silver sponsor logo.' },
      { key: 'sp_kids_connection', label: 'Kids Connection Schools',  default: 'images/sponsors/WhatsApp-Image-2023-10-20-at-2.22.33-PM-1024x1018.jpeg', hint: 'Silver sponsor logo.' },
      { key: 'sp_bmo',             label: 'BMO',                      default: 'images/sponsors/BMO_Updated-768x440.png',                              hint: 'Bronze sponsor logo.' },
      { key: 'sp_rosalind',        label: 'Rosalind Chin',            default: 'images/sponsors/rosalind_chin.png',                                    hint: 'Bronze sponsor logo.' },
      { key: 'sp_ebiw',            label: 'EBIW',                     default: 'images/sponsors/ebiw-768x122.png',                                     hint: 'Bronze sponsor logo.' },
      { key: 'sp_shiraz',          label: 'Shiraz Zack Real Estate',  default: 'images/sponsors/kw_PHOTO-2022-09-12-21-14-21.jpg',                     hint: 'Bronze sponsor logo.' },
      { key: 'sp_jaspreet',        label: 'Jaspreet',                 default: 'images/sponsors/Jaspreet-768x621.png',                                 hint: 'Classic sponsor logo.' },
      { key: 'sp_nanda',           label: 'Nanda Cal Realty',         default: 'images/sponsors/Mamta_logo_new-scaled-1-768x512.jpg',                  hint: 'Classic sponsor logo.' },
      { key: 'sp_andrew',          label: 'Andrew Klink',             default: 'images/sponsors/Andrew_Klink_2-scaled-1-768x432.jpeg',                 hint: 'Classic sponsor logo.' },
      { key: 'sp_gama_ride',       label: 'Gama Ride',                default: 'images/sponsors/gama_ride_working-1.png',                              hint: 'Classic sponsor logo.' },
    ],
  },
];

// ── App ───────────────────────────────────────────────────────────────────────
var currentTab = SECTIONS[0].id;

function initApp() {
  renderTabs();
  renderPanels();
  showTab(SECTIONS[0].id);
}

function renderTabs() {
  var container = document.getElementById('tabs');
  container.innerHTML = '';
  SECTIONS.forEach(function(sec) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.id = 'tab-' + sec.id;
    btn.textContent = sec.label;
    btn.onclick = function() { showTab(sec.id); };
    container.appendChild(btn);
  });
}

function showTab(id) {
  currentTab = id;
  SECTIONS.forEach(function(sec) {
    var btn = document.getElementById('tab-' + sec.id);
    var panel = document.getElementById('panel-' + sec.id);
    if (sec.id === id) {
      btn.classList.add('active');
      panel.classList.remove('hidden');
    } else {
      btn.classList.remove('active');
      panel.classList.add('hidden');
    }
  });
}

function renderPanels() {
  var container = document.getElementById('panels');
  container.innerHTML = '';
  SECTIONS.forEach(function(sec) {
    var panel = document.createElement('div');
    panel.id = 'panel-' + sec.id;
    panel.className = 'hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5';
    sec.items.forEach(function(item) {
      panel.appendChild(renderCard(item));
    });
    container.appendChild(panel);
  });
}

function renderCard(item) {
  var key = item.key;
  var current = ContentStore.img(key, item.default);
  var isOverridden = !!ContentStore.keys().find(function(k) { return k === key; });

  var card = document.createElement('div');
  card.className = 'card flex flex-col gap-4';
  card.id = 'card-' + key;

  card.innerHTML =
    '<div class="flex items-start justify-between gap-2">' +
      '<div>' +
        '<div class="font-semibold text-[#1F2937] text-sm">' + escHtml(item.label) + '</div>' +
        '<div class="text-xs text-[#9CA3AF] mt-0.5">' + escHtml(item.hint) + '</div>' +
      '</div>' +
      (isOverridden
        ? '<span class="badge bg-green-100 text-green-700 flex-shrink-0">Custom</span>'
        : '<span class="badge bg-gray-100 text-gray-500 flex-shrink-0">Default</span>') +
    '</div>' +
    '<div class="flex items-center justify-center bg-[#F9F9F9] rounded-xl p-3" style="min-height:80px">' +
      '<img id="thumb-' + key + '" src="' + escHtml(current) + '" alt="' + escHtml(item.label) + '" class="thumb" onerror="this.style.opacity=0.2"/>' +
    '</div>' +
    '<label class="drop-zone rounded-xl p-4 flex flex-col items-center gap-2 cursor-pointer text-center" id="dz-' + key + '">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5" style="width:28px;height:28px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>' +
      '<span class="text-xs text-[#9CA3AF]">Click or drag & drop an image</span>' +
      '<input type="file" accept="image/*" class="hidden" onchange="handleUpload(\'' + key + '\', this, ' + JSON.stringify(item.default) + ')"/>' +
    '</label>' +
    (isOverridden
      ? '<button class="text-xs text-red-400 hover:text-red-600 transition-colors underline" onclick="handleReset(\'' + key + '\', ' + JSON.stringify(item.default) + ')">Reset to default</button>'
      : '');

  // Drag-and-drop
  var dz = card.querySelector('#dz-' + key);
  dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', function() { dz.classList.remove('drag-over'); });
  dz.addEventListener('drop', function(e) {
    e.preventDefault();
    dz.classList.remove('drag-over');
    var file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) processFile(key, file, item.default);
  });

  return card;
}

function handleUpload(key, input, defaultSrc) {
  var file = input.files[0];
  if (!file) return;
  processFile(key, file, defaultSrc);
}

function processFile(key, file, defaultSrc) {
  ContentStore.readFile(file, key, function(k, dataUrl) {
    refreshCard(k, defaultSrc);
    showToast('Image updated! Reload the site page to see changes.');
  });
}

function handleReset(key, defaultSrc) {
  if (!confirm('Reset "' + key + '" to the default image?')) return;
  ContentStore.resetImg(key);
  refreshCard(key, defaultSrc);
  showToast('Reset to default.');
}

function refreshCard(key, defaultSrc) {
  var section = SECTIONS.find(function(s) { return s.items.find(function(i) { return i.key === key; }); });
  if (!section) return;
  var item = section.items.find(function(i) { return i.key === key; });
  if (!item) return;
  var card = document.getElementById('card-' + key);
  if (!card) return;
  var newCard = renderCard(item);
  card.replaceWith(newCard);
  // Re-attach drag events (already done in renderCard)
}

function confirmResetAll() {
  if (!confirm('This will delete ALL custom image uploads and revert every image to its default. Continue?')) return;
  ContentStore.keys().forEach(function(k) { ContentStore.resetImg(k); });
  renderPanels();
  showTab(currentTab);
  showToast('All images reset to defaults.');
}

function handleExport() {
  ContentStore.exportJSON();
}

function handleImport(input) {
  var file = input.files[0];
  if (!file) return;
  ContentStore.importJSON(file, function(count) {
    renderPanels();
    showTab(currentTab);
    showToast('Imported ' + count + ' image(s). Reload site pages to see changes.');
  });
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;background:#1F2937;color:#fff;border-radius:9999px;padding:0.625rem 1.25rem;font-size:0.82rem;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:opacity 0.4s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 400); }, 3000);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Auto-init if already logged in
if (sessionStorage.getItem('baybasi_admin') === '1') {
  initApp();
}
</script>
</body>
</html>
